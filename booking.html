<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>다올105 상담 예약</title>
<style>
  :root{
    --font:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    --ink:#161b26;--sub:#4f5967;--faint:#8b95a4;--line:#e4e8ef;--bg:#f5f7fa;--card:#fff;
    --brand:#2f6df0;--brand-ink:#1c46b8;--brand-soft:#e8f0fe;--ok:#0e9f6e;--shadow:0 1px 3px rgba(20,26,44,.07);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.55}
  .wrap{max-width:600px;margin:0 auto;padding:18px 15px 60px}
  .hero{background:linear-gradient(135deg,#12235e,#2f6df0);color:#fff;border-radius:18px;padding:20px 22px;box-shadow:0 10px 28px rgba(18,35,94,.25)}
  .hero .k{font-size:12px;font-weight:700;letter-spacing:.08em;opacity:.85}
  .hero h1{font-size:22px;font-weight:800;margin:6px 0 3px}
  .hero p{font-size:13px;margin:0;opacity:.92}
  .card{background:var(--card);border:1px solid var(--line);border-radius:15px;box-shadow:var(--shadow);padding:16px 17px;margin-top:14px}
  .lab{font-size:12.5px;font-weight:800;color:var(--sub);margin:0 0 8px;display:flex;align-items:center;gap:7px}
  .lab .n{width:20px;height:20px;border-radius:6px;background:var(--brand);color:#fff;font-size:12px;display:grid;place-items:center}
  .f{display:flex;flex-direction:column;gap:8px}
  input,select{font:inherit;font-size:15px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff;color:var(--ink);width:100%}
  input:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(47,109,240,.14)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .subs{display:flex;gap:8px;flex-wrap:wrap}
  .sub{border:1.5px solid var(--line);border-radius:10px;padding:9px 15px;font-weight:700;font-size:14px;cursor:pointer;user-select:none;background:#fff}
  .sub.on{background:var(--brand-soft);border-color:var(--brand);color:var(--brand-ink)}
  .sub .t{font-size:10.5px;font-weight:600;color:var(--faint);display:block;margin-top:1px}
  .sub.on .t{color:var(--brand-ink)}
  .info{background:var(--brand-soft);color:var(--brand-ink);border-radius:11px;padding:11px 14px;font-size:13px;margin-top:10px;display:none}
  .info.show{display:block}
  .days{display:flex;flex-direction:column;gap:9px}
  .day{border:1px solid var(--line);border-radius:12px;padding:11px 13px;background:#fff}
  .day .dh{font-weight:800;font-size:13.5px;margin-bottom:8px;display:flex;align-items:center;gap:7px}
  .day .dh .sat{font-size:11px;color:#e08307;font-weight:800}
  .slots{display:flex;gap:7px;flex-wrap:wrap}
  .slot{border:1.5px solid var(--line);border-radius:9px;padding:8px 14px;font-weight:700;font-size:14px;cursor:pointer;background:#fff;font-variant-numeric:tabular-nums}
  .slot.on{background:var(--brand);border-color:var(--brand);color:#fff}
  .slot.taken{background:#f1f3f6;color:#c2c8d2;cursor:not-allowed;text-decoration:line-through}
  .closed{font-size:12px;color:var(--faint)}
  .confirm{background:#f0fdf7;border:1px solid #bbf0d6;border-radius:12px;padding:13px 15px;margin-top:12px;font-size:14px;display:none}
  .confirm.show{display:block}
  .confirm b{color:var(--ok)}
  .arrive{font-size:16px;font-weight:800;color:var(--ink);margin-top:4px}
  .btn{width:100%;border:none;background:var(--brand);color:#fff;font:inherit;font-weight:800;font-size:16px;padding:15px;border-radius:13px;cursor:pointer;margin-top:16px}
  .btn:disabled{background:#c2c8d2;cursor:not-allowed}
  .foot{text-align:center;font-size:11.5px;color:var(--faint);margin-top:20px}
  .center{max-width:460px;margin:70px auto;text-align:center;padding:0 20px}
  .center .ic{font-size:44px}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="hero">
    <div class="k">다올105 학원 · 상담 예약</div>
    <h1>상담을 예약해 주세요</h1>
    <p>과목을 고르면 레벨테스트·도착시간을 자동으로 안내해 드립니다.</p>
  </div>

  <div class="card">
    <div class="lab"><span class="n">1</span> 학생 정보</div>
    <div class="f">
      <input id="name" placeholder="학생 이름"/>
      <div class="row2">
        <input id="phone" inputmode="numeric" placeholder="학부모 연락처 (010…)"/>
        <input id="school" placeholder="학교 (예: 미사고)"/>
      </div>
      <select id="grade">
        <option value="">학년 선택</option>
        <option>초3</option><option>초4</option><option>초5</option><option>초6</option>
        <option>중1</option><option>중2</option><option>중3</option>
        <option>고1</option><option>고2</option><option>고3</option><option>N수</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="lab"><span class="n">2</span> 상담 과목 (복수 선택 가능)</div>
    <div class="subs" id="subs">
      <span class="sub" data-s="국어">국어<span class="t">레벨테스트 30분</span></span>
      <span class="sub" data-s="영어">영어<span class="t">레벨테스트 30분</span></span>
      <span class="sub" data-s="수학">수학<span class="t">레벨테스트 30분</span></span>
      <span class="sub" data-s="과학">과학<span class="t">테스트 없음</span></span>
    </div>
    <div class="info" id="testInfo"></div>
  </div>

  <div class="card">
    <div class="lab"><span class="n">3</span> 날짜·시간 선택</div>
    <div class="days" id="days"></div>
    <div class="confirm" id="confirm"></div>
  </div>

  <button class="btn" id="submit" disabled>예약하기</button>
  <div class="foot">다올105 학원 · 상담 문의 0507-1399-8155 · 일요일 휴무</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
/* ===== 원장 상담 가용 규칙 ===== */
const WEEKDAY_SLOTS = ["10:00"];                                  // 월~금
const SAT_SLOTS = ["11:30","12:30","13:30","14:30","15:00"];      // 토 (마지막 3시)
// 일요일은 닫음. 레벨테스트: 국·영·수 = 30분씩, 과학 = 없음.
const TEST_SUBJECTS = ["국어","영어","수학"], TEST_MIN = 30;
const DAYS_AHEAD = 21, WD = ["일","월","화","수","목","금","토"];

const cfg = window.DAOL_CONFIG||{};
const useSupa = !!(cfg.url && cfg.anonKey && window.supabase);
const sb = useSupa ? window.supabase.createClient(cfg.url, cfg.anonKey) : null;

let picked = {subjects:new Set(), date:null, time:null};
let taken = {};   // "YYYY-MM-DD" -> Set(times)

const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,"0");
const iso = d => d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
function toMin(t){const m=t.split(":");return +m[0]*60+ +m[1];}
function fromMin(x){return pad(Math.floor(x/60))+":"+pad(x%60);}

function testMinutes(){ return [...picked.subjects].filter(s=>TEST_SUBJECTS.includes(s)).length * TEST_MIN; }
function arriveTime(){ if(!picked.time) return null; const a=toMin(picked.time)-testMinutes(); return fromMin(a); }

/* 과목 선택 */
$("subs").addEventListener("click",e=>{
  const c=e.target.closest(".sub"); if(!c) return;
  const s=c.dataset.s;
  if(picked.subjects.has(s)){picked.subjects.delete(s);c.classList.remove("on");}
  else{picked.subjects.add(s);c.classList.add("on");}
  renderTestInfo(); renderConfirm(); updateBtn();
});
function renderTestInfo(){
  const tm=testMinutes(); const box=$("testInfo");
  if(!picked.subjects.size){ box.classList.remove("show"); return; }
  box.classList.add("show");
  box.innerHTML = tm>0
    ? `📝 레벨테스트 <b>${tm}분</b> (${[...picked.subjects].filter(s=>TEST_SUBJECTS.includes(s)).join("·")}) — 상담 <b>${tm}분 전</b>에 오셔서 테스트 후 상담이 진행됩니다.`
    : `✅ 선택 과목은 레벨테스트가 없습니다. <b>상담 시간에 맞춰</b> 오시면 됩니다.`;
}

/* 날짜·슬롯 */
function buildDays(){
  const wrap=$("days"); wrap.innerHTML="";
  const today=new Date(); today.setHours(0,0,0,0);
  for(let i=0;i<DAYS_AHEAD;i++){
    const d=new Date(today); d.setDate(today.getDate()+i);
    const dow=d.getDay();
    if(dow===0) continue;                          // 일요일 닫음
    const slots = dow===6 ? SAT_SLOTS : WEEKDAY_SLOTS;
    const key=iso(d);
    const el=document.createElement("div"); el.className="day";
    const sat = dow===6 ? '<span class="sat">토</span>' : '';
    el.innerHTML=`<div class="dh">${d.getMonth()+1}월 ${d.getDate()}일 (${WD[dow]}) ${sat}</div>`;
    const sc=document.createElement("div"); sc.className="slots";
    slots.forEach(t=>{
      const b=document.createElement("span"); b.className="slot"; b.textContent=t;
      if((taken[key]||new Set()).has(t)){ b.classList.add("taken"); }
      else b.addEventListener("click",()=>{
        document.querySelectorAll(".slot.on").forEach(x=>x.classList.remove("on"));
        b.classList.add("on"); picked.date=key; picked.time=t; renderConfirm(); updateBtn();
      });
      sc.appendChild(b);
    });
    el.appendChild(sc); wrap.appendChild(el);
  }
}
function renderConfirm(){
  const box=$("confirm");
  if(!picked.date||!picked.time){ box.classList.remove("show"); return; }
  const [y,m,dd]=picked.date.split("-"); const dobj=new Date(+y,+m-1,+dd);
  const tm=testMinutes(); const arr=arriveTime();
  box.classList.add("show");
  box.innerHTML = `<b>선택:</b> ${+m}월 ${+dd}일(${WD[dobj.getDay()]}) 상담 <b>${picked.time}</b>`
    + (tm>0 ? `<div class="arrive">⏰ ${arr}까지 도착 (레벨테스트 ${tm}분 포함)</div>`
            : `<div class="arrive">⏰ ${picked.time}까지 도착</div>`);
}
function updateBtn(){
  const ok = $("name").value.trim() && /^01\d{8,9}$/.test($("phone").value.replace(/\D/g,""))
    && $("grade").value && picked.subjects.size && picked.date && picked.time;
  $("submit").disabled=!ok;
}
["name","phone","school","grade"].forEach(id=>$(id).addEventListener("input",updateBtn));

/* 예약 가능여부(이미 잡힌 슬롯) 로드 */
async function loadTaken(){
  if(!useSupa) return;
  try{
    const today=iso(new Date());
    const {data} = await sb.from("booked_slots").select("slot_date,slot_time").gte("slot_date",today);
    (data||[]).forEach(r=>{ (taken[r.slot_date]=taken[r.slot_date]||new Set()).add(r.slot_time); });
  }catch(e){ /* bookings 테이블 준비 전이면 가용표시 없이 진행 */ }
}

$("submit").addEventListener("click",async()=>{
  const btn=$("submit"); btn.disabled=true; btn.textContent="예약 중…";
  const rec={ slot_date:picked.date, slot_time:picked.time, arrive_time:arriveTime(),
    student_name:$("name").value.trim(), phone:$("phone").value.replace(/\D/g,""),
    school:$("school").value.trim(), grade:$("grade").value,
    subjects:[...picked.subjects].join(","), level_test_min:testMinutes() };
  try{
    if(useSupa){
      // 막판 중복 확인
      const {data:dup}=await sb.from("booked_slots").select("slot_date").eq("slot_date",rec.slot_date).eq("slot_time",rec.slot_time).limit(1);
      if(dup&&dup.length){ alert("방금 다른 분이 그 시간을 예약했어요. 다른 시간을 선택해 주세요."); location.reload(); return; }
      const {error}=await sb.from("bookings").insert(rec);
      if(error) throw error;
    }
    const arr=arriveTime(), tm=rec.level_test_min;
    document.getElementById("app").innerHTML =
      `<div class="center"><div class="ic">✅</div><h2>예약이 접수되었습니다</h2>`
      +`<p style="color:#4f5967;font-size:15px"><b>${rec.student_name}</b> 학생 · ${rec.grade}<br>`
      +`${rec.slot_date.replace(/-/g,'.').slice(2)} 상담 <b>${rec.slot_time}</b><br>`
      +(tm>0?`<b style="color:#2f6df0">⏰ ${arr}까지 도착</b> (레벨테스트 ${tm}분 포함)`:`<b style="color:#2f6df0">⏰ ${rec.slot_time}까지 도착</b>`)
      +`</p><p style="color:#8b95a4;font-size:13px">준비물·오시는 길은 곧 문자로 안내드립니다.<br>변경은 0507-1399-8155로 연락 주세요.</p></div>`;
  }catch(e){
    alert("예약 저장 중 문제가 발생했어요. 잠시 후 다시 시도해 주세요."); btn.disabled=false; btn.textContent="예약하기";
  }
});

async function init(){ await loadTaken(); buildDays(); }
init();
</script>
</body>
</html>
